name: CI/CD - Jah-UI

on:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      # 1. Configuramos Node primero
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # 2. Instalamos PNPM y le activamos su caché nativo en un solo paso
      - name: Instalar PNPM
        uses: pnpm/action-setup@v4 # Actualizado a v4 que es más estable con caché
        with:
          version: 9 # Reemplaza por tu versión de pnpm si usas otra (ej: 8, 9, 10)
          dest: ~/setup-pnpm

      # 3. Le decimos a pnpm que use el almacenamiento con caché integrado
      - name: Configurar ruta de almacenamiento de PNPM
        run: pnpm config set store-dir ~/.pnpm-store

      # 4. Instalar Dependencias
      - name: Instalar Dependencias
        run: pnpm install --frozen-lockfile

      - name: Compilar Librería
        run: pnpm run build

      - name: Publicar en NPM
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Desplegar Storybook en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: storybook-static # Carpeta donde se genera Storybook
          branch: gh-pages # Rama donde se guardará la web de documentación