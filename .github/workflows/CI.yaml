name: CI/CD - Jah-UI

on:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      # 1. Configuramos Node y el registro de NPM
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # 2. Instalamos usando npm tradicional para saltarnos el bug de pnpm en CI
      - name: Instalar Dependencias
        run: npm install

      # 3. Compilamos el código de la librería para producción
      - name: Compilar Librería
        run: npm run build

      # 4. Compilamos Storybook para generar la documentación
      - name: Compilar Storybook
        run: npm run build-storybook

      # 5. Publicamos en NPM usando el Token secreto
      - name: Publicar en NPM
        run: npm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 6. Desplegamos Storybook a GitHub Pages
      - name: Desplegar Storybook en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: storybook-static
          branch: gh-pages